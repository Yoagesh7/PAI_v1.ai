{% extends "base.html" %}

{% block content %}
<div style="max-width:420px;margin:48px auto;padding:24px;">
  <div class="card" style="padding:20px;">
    <div style="display:flex;justify-content:center;margin-bottom:16px;">
      <img src="/static/images/partnerai-logo.svg" alt="PartnerAI logo" style="width:72px;height:72px;border-radius:18px;box-shadow:0 16px 40px rgba(79, 92, 255, 0.14);">
    </div>
    <h2>Admin Login</h2>
    <p class="text-sm text-secondary">Enter the admin token to access the management dashboard.</p>

    <div style="margin-top:12px;">
      <label class="text-xs font-bold">Admin Token</label>
      <input id="adminToken" class="input" style="width:100%;margin-top:8px;" />
    </div>

    <div style="margin-top:14px; display:flex; gap:8px;">
      <button class="btn btn-primary" onclick="doLogin()">Sign in</button>
      <a class="btn btn-secondary" href="/">Cancel</a>
    </div>

    <div id="adminMsg" style="margin-top:8px; display:none; color:var(--color-error);"></div>
  </div>
</div>

<script>
async function doLogin(){
  const token = document.getElementById('adminToken').value.trim();
  const msg = document.getElementById('adminMsg');
  msg.style.display='none';
  try{
    const res = await fetch('/admin-login', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({token})});
    const data = await res.json();
    if(data.success){ window.location.href='/admin'; return; }
    msg.innerText = data.error||'Invalid token'; msg.style.display='block';
  }catch(e){ msg.innerText='Error'; msg.style.display='block'; }
}
</script>

{% endblock %}
