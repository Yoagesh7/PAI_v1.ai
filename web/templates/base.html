<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>PartnerAI</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Design System -->
    <link rel="stylesheet" href="/static/css/design-system.css">

    <!-- App Icon -->
    <link rel="icon" type="image/png" href="/static/images/logo.png">
    <link rel="apple-touch-icon" href="/static/images/logo.png">

    <!-- PWA manifest -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#7A66C2">

    <!-- Theme Initialization (Prevents Flash) -->
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme');

            if (savedTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                if (!savedTheme) localStorage.setItem('theme', 'dark');
            }
        })();

        window.toggleTheme = function () {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';

            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);

            // Dispatch event for other components if needed
            window.dispatchEvent(new Event('themeChanged'));
            return newTheme;
        };
    </script>

    <style>
        /* ============================================
           APP LAYOUT STRUCTURE
           ============================================ */

        .app-container {
            display: flex;
            min-height: 100vh;
            background: var(--color-bg-primary);
        }

        /* ============================================
           LEFT SIDEBAR (Desktop)
           ============================================ */

        .left-sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: var(--color-bg-secondary);
            border-right: 1px solid var(--color-border-light);
            display: flex;
            flex-direction: column;
            z-index: var(--z-fixed);
            transition: transform var(--transition-base);
        }

        .sidebar-header {
            padding: var(--space-6) var(--space-5);
            border-bottom: 1px solid var(--color-border-light);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            font-weight: 700;
            font-size: var(--text-lg);
            color: var(--color-text-primary);
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            display: block;
            border-radius: 10px;
            object-fit: cover;
        }

        /* Navigation */
        .sidebar-nav {
            flex: 1;
            padding: var(--space-4) var(--space-3);
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: var(--space-6);
        }

        .nav-section-title {
            font-size: var(--text-xs);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--color-text-muted);
            padding: 0 var(--space-3);
            margin-bottom: var(--space-2);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-3);
            margin-bottom: var(--space-1);
            border-radius: var(--radius-md);
            color: var(--color-text-secondary);
            text-decoration: none;
            font-size: var(--text-sm);
            font-weight: 500;
            transition: all var(--transition-fast);
            min-height: var(--touch-target-min);
        }

        .nav-item:hover {
            background: var(--color-bg-tertiary);
            color: var(--color-text-primary);
        }

        .nav-item.active {
            background: var(--color-primary-50);
            color: var(--color-primary-600);
            font-weight: 600;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: var(--space-4) var(--space-3);
            border-top: 1px solid var(--color-border-light);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3);
            border-radius: var(--radius-md);
            transition: background var(--transition-fast);
            cursor: pointer;
        }

        .user-profile:hover {
            background: var(--color-bg-tertiary);
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--color-text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-email {
            font-size: var(--text-xs);
            color: var(--color-text-tertiary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ============================================
           MAIN CONTENT AREA
           ============================================ */

        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-container {
            flex: 1;
            padding: var(--space-6);
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: var(--space-6);
        }

        .page-title {
            font-size: var(--text-3xl);
            font-weight: 700;
            color: var(--color-text-primary);
            margin: 0 0 var(--space-2) 0;
        }

        .page-description {
            font-size: var(--text-base);
            color: var(--color-text-secondary);
            margin: 0;
        }

        /* ============================================
           MOBILE BOTTOM NAVIGATION
           ============================================ */

        .mobile-bottom-nav {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 12px;
            right: 12px;
            height: 64px;
            background: rgba(255, 255, 255, 0.92);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10), 0 1px 4px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255,255,255,0.6);
            z-index: var(--z-fixed);
            padding: 0 8px;
            /* Safe area for notched phones */
            padding-bottom: env(safe-area-inset-bottom, 0px);
            margin: 0 auto;
            max-width: 500px;
        }

        [data-theme="dark"] .mobile-bottom-nav {
            background: rgba(30, 30, 36, 0.94);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        .mobile-nav-items {
            display: flex;
            height: 100%;
            justify-content: space-around;
            align-items: center;
            gap: 2px;
            width: 100%;
        }

        .mobile-nav-item {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 23px;
            color: var(--color-text-tertiary);
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: transparent;
            overflow: hidden;
            padding: 0;
            cursor: pointer;
            border: none;
            flex-shrink: 0;
            position: relative;
        }

        .mobile-nav-item svg {
            width: 22px;
            height: 22px;
            stroke-width: 2px;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .mobile-nav-item span {
            display: none;
            font-size: 13px;
            font-weight: 600;
            margin-left: 7px;
            white-space: nowrap;
        }

        /* Active: pill expands with gradient */
        .mobile-nav-item.active {
            width: auto;
            min-width: 96px;
            padding: 0 18px;
            background: linear-gradient(135deg, #8B5CF6 0%, #6366f1 100%);
            color: white !important;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35);
        }

        .mobile-nav-item.active span { display: block; }
        .mobile-nav-item.active svg { color: white; transform: scale(1.05); }

        .mobile-nav-item:not(.active):hover {
            background: var(--color-bg-tertiary);
            color: var(--color-text-primary);
        }

        .mobile-nav-item:active { transform: scale(0.93); }

        /* ============================================
           RESPONSIVE DESIGN
           ============================================ */

        @media (max-width: 768px) {
            .left-sidebar {
                transform: translateX(-100%);
                /* Smooth slide-in from left */
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .left-sidebar.mobile-open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                /* bottom padding = nav height + extra breathing room */
                padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px) + 24px);
            }

            .page-container {
                padding: var(--space-4) var(--space-4) var(--space-4);
            }

            .page-title {
                font-size: var(--text-2xl);
            }

            /* Show bottom nav pill */
            .mobile-bottom-nav {
                display: block;
            }

            /* Cards should be full-width with less padding */
            .card {
                border-radius: var(--radius-lg) !important;
            }

            /* Page header compact */
            .page-header {
                margin-bottom: var(--space-4);
            }
        }

        /* Extra small screens */
        @media (max-width: 375px) {
            .mobile-bottom-nav {
                min-width: 280px;
                height: 60px;
            }
            .mobile-nav-item.active {
                min-width: 82px;
                padding: 0 14px;
            }
        }

        /* Mobile sidebar overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: calc(var(--z-fixed) - 1);
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* Mobile menu button removed */
        .mobile-menu-btn {
            display: none !important;
        }

        /* Mobile More Popup (above 3-dot button) */
        .more-btn-wrapper {
            position: relative;
        }

        .mobile-more-popup {
            position: absolute;
            bottom: calc(100% + 12px);
            right: 8px;
            left: auto;
            background: var(--color-bg-secondary);
            border-radius: 18px;
            padding: 6px;
            box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.13), 0 8px 24px rgba(0, 0, 0, 0.10);
            border: 1px solid var(--color-border-light);
            min-width: 160px;
            max-width: 320px;
            width: auto;
            opacity: 0;
            transform: translateY(8px) scale(0.93);
            transform-origin: bottom right;
            transition: opacity 0.18s cubic-bezier(0.2, 0.8, 0.2, 1),
                        transform 0.18s cubic-bezier(0.2, 0.8, 0.2, 1);
            pointer-events: none;
            z-index: 200;
            overflow: hidden;
            word-break: break-word;
        }

        [data-theme="dark"] .mobile-more-popup {
            box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.5), 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .mobile-more-popup.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        /* Arrow pointer at the bottom */
        .mobile-more-popup::after {
            content: '';
            position: absolute;
            bottom: -7px;
            right: 20px;
            width: 12px;
            height: 12px;
            background: var(--color-bg-secondary);
            border-right: 1px solid var(--color-border-light);
            border-bottom: 1px solid var(--color-border-light);
            transform: rotate(45deg);
        }

        /* Make popup full-width with margins on very small screens */
        @media (max-width: 480px) {
            .mobile-more-popup {
                position: fixed;
                bottom: 90px;
                left: 16px;
                right: 16px;
                width: auto;
                max-width: none;
                transform-origin: bottom center;
                margin: 0;
            }

            .mobile-more-popup::after { 
                right: 32px; 
            }
        }

        .popup-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--color-text-primary);
            font-size: 14px;
            font-weight: 500;
            transition: background 0.12s;
            white-space: nowrap;
        }

        .popup-item:hover,
        .popup-item:active {
            background: var(--color-bg-tertiary);
        }

        .popup-item-icon {
            width: 30px;
            height: 30px;
            background: var(--color-bg-tertiary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }

        /* Transparent overlay to catch outside clicks */
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: transparent;
            z-index: 89;
            display: none;
        }

        .drawer-overlay.active {
            display: block;
        }
    </style>

    {% block head %}{% endblock %}
</head>

                            <span>Workspace</span>
                        </a>
                        <a href="/settings" class="popup-item">
                            <div class="popup-item-icon">⚙️</div>
                            <span>Settings</span>
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <script>
        // Mobile sidebar toggle
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
        }

        // More Popup Toggle
        function toggleMoreDrawer() {
            const popup = document.getElementById('morePopup');
            const overlay = document.getElementById('drawerOverlay');
            const btn = document.getElementById('moreBtn');

            const isOpen = popup.classList.toggle('active');
            overlay.classList.toggle('active', isOpen);
            btn.classList.toggle('active', isOpen);
        }

        // Close sidebar when clicking nav item on mobile
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    toggleMobileSidebar();
                }
            });
        });

        // PWA install flow: capture beforeinstallprompt and expose promptInstall()
        window.deferredInstallPrompt = null;
        window.isAppInstalled = false;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredInstallPrompt = e;
            // Optionally show an install UI (the Settings page will query this)
            document.body.dispatchEvent(new CustomEvent('pwa:available'));
        });

        window.addEventListener('appinstalled', () => {
            window.isAppInstalled = true;
            document.body.dispatchEvent(new CustomEvent('pwa:installed'));
        });

        function promptInstall() {
            const e = window.deferredInstallPrompt;
            if (!e) {
                return Promise.reject(new Error('Install prompt not available'));
            }
            return e.prompt().then(() => e.userChoice).then(choice => {
                window.deferredInstallPrompt = null;
                return choice;
            });
        }

        // Register service worker if supported
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/service-worker.js').then(reg => {
                    console.log('ServiceWorker registered', reg);
                }).catch(err => {
                    console.warn('ServiceWorker registration failed:', err);
                });
            });
        }
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
