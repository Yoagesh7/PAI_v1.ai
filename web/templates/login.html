<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - PartnerAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/design-system.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#7A66C2">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #F4F1FA 0%, #FAFBFC 100%);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: var(--space-4);
        }

        .login-card {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-xl);
            padding: var(--space-10) var(--space-8);
            box-shadow: var(--shadow-xl);
            text-align: center;
        }

        .brand-logo {
            width: 88px;
            height: 88px;
            display: block;
            margin: 0 auto 18px;
            border-radius: 22px;
            box-shadow: 0 16px 40px rgba(79, 92, 255, 0.14);
            font-weight: 700;
        }

        h1 {
            font-size: var(--text-3xl);
            font-weight: 700;
            color: var(--color-text-primary);
            margin: 0 0 var(--space-2) 0;
        }

        .subtitle {
            font-size: var(--text-base);
            color: var(--color-text-secondary);
            margin: 0 0 var(--space-8) 0;
        }

        .form-group {
            margin-bottom: var(--space-4);
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--color-text-secondary);
            margin-bottom: var(--space-2);
        }

        .form-group input {
            width: 100%;
            padding: var(--space-3) var(--space-4);
            font-size: var(--text-base);
            color: var(--color-text-primary);
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary-500);
            background: var(--color-bg-secondary);
            box-shadow: 0 0 0 3px var(--color-primary-50);
        }

        .btn-submit {
            width: 100%;
            padding: var(--space-4) var(--space-6);
            background: var(--color-primary-500);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--text-base);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-base);
            margin-top: var(--space- 4);
            font-family: inherit;
        }

        .btn-submit:hover {
            background: var(--color-primary-600);
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .toggle-mode {
            margin-top: var(--space-6);
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
        }

        .toggle-mode a {
            color: var(--color-primary-600);
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-mode a:hover {
            text-decoration: underline;
        }

        .error-msg {
            display: none;
            padding: var(--space-3) var(--space-4);
            background: var(--color-error-bg);
            color: var(--color-error);
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            margin-bottom: var(--space-4);
            text-align: left;
        }

        .install-prompt {
            display: none;
            position: fixed;
            left: 16px;
            right: 16px;
            bottom: 16px;
            z-index: 9999;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(122, 102, 194, 0.22);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.18);
            padding: 16px;
            backdrop-filter: blur(14px);
        }

        .install-prompt-inner {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .install-prompt-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            flex-shrink: 0;
            box-shadow: 0 10px 24px rgba(79, 92, 255, 0.16);
        }

        .install-prompt h3 {
            margin: 0 0 4px 0;
            font-size: 1rem;
            color: var(--color-text-primary);
        }

        .install-prompt p {
            margin: 0;
            font-size: 0.92rem;
            color: var(--color-text-secondary);
        }

        .install-prompt-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: flex-end;
        }

        .install-prompt .btn-mini {
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid transparent;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .install-prompt .btn-primary-mini {
            background: var(--color-primary-500);
            color: #fff;
        }

        .install-prompt .btn-secondary-mini {
            background: transparent;
            color: var(--color-text-secondary);
            border-color: var(--color-border-default);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: var(--space-8) var(--space-6);
            }

            h1 {
                font-size: var(--text-2xl);
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <img class="brand-logo" src="/static/images/logo.png" alt="PartnerAI logo">
            <h1 id="title">Welcome Back</h1>
            <p class="subtitle" id="subtitle">Sign in to continue to PartnerAI</p>

            <div class="error-msg" id="error"></div>

            <form onsubmit="submitAuth(event)">
                <div class="form-group">
                    <label for="username" id="user-label">Username</label>
                    <input type="text" id="username" placeholder="Choose a username" autocomplete="username" required>
                </div>

                <div class="form-group" id="emailGroup">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label for="password">Password</label>
                        <a href="#" id="forgot-link" onclick="showForgot(event)" style="font-size: var(--text-xs); color: var(--color-primary-600); text-decoration: none; margin-bottom: var(--space-2);">Forgot Password?</a>
                    </div>
                    <input type="password" id="password" placeholder="Enter your password"
                        autocomplete="current-password" required>
                </div>

                <div class="form-group" id="confirmGroup" style="display:none;">
                    <label for="confirm-pass">Confirm Password</label>
                    <input type="password" id="confirm-pass" placeholder="Confirm your password">
                </div>

                <div class="form-group" id="verifyGroup" style="display:none;">
                    <label for="verify-code">Verification Code</label>
                    <input type="text" id="verify-code" placeholder="Enter 6-digit code from email" maxlength="6">
                    <button type="button" class="btn-resend" id="btn-resend" onclick="resendVerificationCode(event)" style="display:none; background: none; border: none; color: var(--color-primary-600); cursor: pointer; padding: 0; margin-top: 8px; font-size: var(--text-sm); font-weight: 500;">Resend Code</button>
                </div>

                <button type="submit" class="btn-submit" id="action-btn">Sign In</button>
            </form>

            <div class="toggle-mode">
                <span id="toggle-msg">New to PartnerAI? <a href="#" onclick="toggleMode(event)">Create
                        Account</a></span>
            </div>
        </div>
    </div>

    <div class="install-prompt" id="installPrompt">
        <div class="install-prompt-inner">
            <img src="/static/images/logo.png" alt="PartnerAI" class="install-prompt-icon">
            <div style="flex:1; text-align:left;">
                <h3>Install PartnerAI</h3>
                <p>Get quick access from your home screen and use it like an app.</p>
                <div class="install-prompt-actions">
                    <button class="btn-mini btn-secondary-mini" onclick="dismissInstallPrompt()">Not now</button>
                    <button class="btn-mini btn-primary-mini" onclick="triggerInstall()">Install</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isLogin = true;
        let isForgot = false;
        let pendingVerification = false; // used for signup flow
        let pendingLoginVerification = false; // used for login 2FA
        let pendingLoginUsername = null; // canonical username for login OTP
        let pendingSignupPayload = null;
        let deferredPrompt = null;

        document.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('partnerai_last_username') || '';
            const savedEmail = localStorage.getItem('partnerai_last_email') || '';
            if (savedUser) {
                const input = document.getElementById('username');
                if (input && !input.value) input.value = savedUser;
            }
            if (savedEmail) {
                const input = document.getElementById('email');
                if (input && !input.value) input.value = savedEmail;
            }
        });

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const prompt = document.getElementById('installPrompt');
            if (prompt) prompt.style.display = 'block';
        });

        window.addEventListener('appinstalled', () => {
            const prompt = document.getElementById('installPrompt');
            if (prompt) prompt.style.display = 'none';
            deferredPrompt = null;
        });

        function dismissInstallPrompt() {
            const prompt = document.getElementById('installPrompt');
            if (prompt) prompt.style.display = 'none';
        }

        async function triggerInstall() {
            if (!deferredPrompt) {
                alert('Use your browser menu to install the app.');
                return;
            }
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            dismissInstallPrompt();
        }

        function toggleMode(event) {
            event.preventDefault();
            isLogin = !isLogin;
            isForgot = false;
            pendingVerification = false;
            pendingLoginVerification = false;
            pendingLoginUsername = '';
            pendingUsername = '';
            pendingSignupPayload = null;

            document.getElementById('title').innerText = isLogin ? "Welcome Back" : "Create Account";
            document.getElementById('subtitle').innerText = isLogin ? "Sign in to continue to PartnerAI" : "Join PartnerAI to get started";
            document.getElementById('action-btn').innerText = isLogin ? "Sign In" : "Create Account";
            document.getElementById('toggle-msg').innerHTML = isLogin
                ? 'New to PartnerAI? <a href="#" onclick="toggleMode(event)">Create Account</a>'
                : 'Already have an account? <a href="#" onclick="toggleMode(event)">Sign In</a>';
            document.getElementById('error').style.display = 'none';

            // Toggle fields
            document.getElementById('emailGroup').style.display = 'block';
            document.getElementById('confirmGroup').style.display = isLogin ? 'none' : 'block';
            document.getElementById('verifyGroup').style.display = 'none';
            document.getElementById('btn-resend').style.display = 'none';
            document.getElementById('forgot-link').style.display = isLogin ? 'block' : 'none';
            document.getElementById('username').parentElement.style.display = 'block';
            document.getElementById('password').parentElement.style.display = 'block';

            // Update password autocomplete
            document.getElementById('password').autocomplete = isLogin ? 'current-password' : 'new-password';
            
            // Update Username label/placeholder
            const userLabel = document.getElementById('user-label');
            const userInput = document.getElementById('username');
            userLabel.innerText = "Username";
            userInput.placeholder = isLogin ? "Enter your username" : "Choose a username";
        }

        function showForgot(event) {
            if (event) event.preventDefault();
            isForgot = true;
            isLogin = false;
            
            document.getElementById('title').innerText = "Reset Password";
            document.getElementById('subtitle').innerText = "Enter your username or email to get a reset code.";
            document.getElementById('action-btn').innerText = "Send Reset Code";
            document.getElementById('toggle-msg').innerHTML = '<a href="#" onclick="toggleMode(event)">Back to Sign In</a>';
            document.getElementById('error').style.display = 'none';
            
            document.getElementById('emailGroup').style.display = 'none';
            document.getElementById('confirmGroup').style.display = 'none';
            document.getElementById('verifyGroup').style.display = 'none';
            document.getElementById('password').parentElement.style.display = 'none';
            document.getElementById('forgot-link').style.display = 'none';
            document.getElementById('username').parentElement.style.display = 'block';
            document.getElementById('user-label').innerText = "Username or Email";
            document.getElementById('username').placeholder = "Enter your username or email";
        }

        async function submitAuth(event) {
            event.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            const confirm = document.getElementById('confirm-pass').value;
            const code = document.getElementById('verify-code').value;

            const btn = document.getElementById('action-btn');
            const err = document.getElementById('error');

            // Base validation
            if (!user) {
                err.innerText = "Please enter your username or email.";
                err.style.display = 'block';
                return;
            }

            // Password check (not required for initial forgot password step)
            if (!isForgot && !pass) {
                err.innerText = "Please enter your password.";
                err.style.display = 'block';
                return;
            }

            if (!isLogin) {
                // Signup or Forgot Password flow
                if (isForgot) {
                    if (pendingVerification) {
                        if (!pass) {
                            err.innerText = "Please enter your new password.";
                            err.style.display = 'block';
                            return;
                        }
                        if (!code || code.length < 6) {
                            err.innerText = "Enter the 6-digit reset code.";
                            err.style.display = 'block';
                            return;
                        }
                    }
                } else {
                    // Normal Signup
                    if (!email) {
                        err.innerText = "Email is required for signup.";
                        err.style.display = 'block';
                        return;
                    }
                    if (!pendingVerification && pass !== confirm) {
                        err.innerText = "Passwords do not match!";
                        err.style.display = 'block';
                        return;
                    }
                    if (pendingVerification && (!code || code.length < 6)) {
                        err.innerText = "Enter the 6-digit verification code.";
                        err.style.display = 'block';
                        return;
                    }
                }
            }

            btn.innerText = "Processing...";
            btn.disabled = true;
            err.style.display = 'none';

            let endpoint;
            const payload = { username: user, email: email, password: pass };
            if (isForgot) {
                if (pendingVerification) {
                    endpoint = '/api/password/reset/verify';
                    payload.identifier = user;
                    payload.code = code;
                    payload.new_password = pass;
                } else {
                    endpoint = '/api/password/reset/request';
                    payload.identifier = user;
                }
            } else if (isLogin) {
                if (pendingLoginVerification) {
                    endpoint = '/api/login/verify';
                    payload.username = pendingLoginUsername || user || pendingUsername;
                    payload.code = code;
                } else {
                    endpoint = '/api/login';
                }
            } else {
                endpoint = pendingVerification ? '/api/signup/verify' : '/api/signup';
                payload.username = user || pendingUsername;
                payload.email = email;
                if (pendingVerification) payload.code = code;
            }

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // Check for HTTP errors first
                if (!res.ok && res.status >= 500) {
                    console.error(`❌ Server error: ${res.status}`);
                    err.innerText = `Server error (${res.status}). Please try again in a moment.`;
                    err.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = isLogin ? "Sign In" : "Create Account";
                    return;
                }
                
                const text = await res.text();
                // Detect HTML error responses
                if (!text || text.startsWith('<!')) {
                    console.error('❌ Server returned HTML instead of JSON');
                    err.innerText = "Server error. Please try again.";
                    err.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = isLogin ? "Sign In" : "Create Account";
                    return;
                }
                
                const data = JSON.parse(text);

                if (data.success && data.verification_required) {
                    // Switch to OTP mode
                    if (isLogin) {
                        pendingLoginVerification = true;
                        pendingLoginUsername = data.username || user;
                        document.getElementById('verifyGroup').style.display = 'block';
                        document.getElementById('user-label').parentElement.style.display = 'none';
                        document.getElementById('emailGroup').style.display = 'none';
                        document.getElementById('password').parentElement.style.display = 'none';
                        document.getElementById('action-btn').innerText = "Verify & Sign In";
                        document.getElementById('subtitle').innerText = "Enter the 6-digit code sent to " + (data.email || email);
                    } else {
                        pendingVerification = true;
                        pendingUsername = user;
                        document.getElementById('verifyGroup').style.display = 'block';
                        document.getElementById('confirmGroup').style.display = 'none';
                        document.getElementById('user-label').parentElement.style.display = 'none';
                        document.getElementById('emailGroup').style.display = 'none';
                        document.getElementById('password').parentElement.style.display = 'none';
                        document.getElementById('action-btn').innerText = "Verify & Create Account";
                        document.getElementById('subtitle').innerText = "Verify your email to continue";
                    }
                    
                    err.innerText = data.message || "Verification code sent.";
                    err.style.display = 'block';
                    err.style.background = '#eef7ff';
                    err.style.color = '#1d4ed8';
                    btn.disabled = false;
                    return;
                }

                if (isForgot && data.success && !pendingVerification) {
                    pendingVerification = true;
                    document.getElementById('verifyGroup').style.display = 'block';
                    document.getElementById('password').parentElement.style.display = 'block';
                    document.getElementById('user-label').parentElement.style.display = 'none';
                    document.getElementById('action-btn').innerText = "Reset Password";
                    document.getElementById('subtitle').innerText = "Enter the 6-digit code and your new password.";
                    document.getElementById('password').placeholder = "Enter new password";
                    document.getElementById('password').value = "";
                    
                    err.innerText = data.message || "Reset code sent.";
                    err.style.display = 'block';
                    err.style.background = '#eef7ff';
                    err.style.color = '#1d4ed8';
                    btn.disabled = false;
                    btn.innerText = "Reset Password";
                    return;
                }

                if (data.success) {
                    // Success! 
                    try {
                        if (user) localStorage.setItem('partnerai_last_username', user);
                        if (email) localStorage.setItem('partnerai_last_email', email);
                        
                        if (data.user_id) {
                            localStorage.setItem('partnerai_user_id', String(data.user_id));
                            localStorage.setItem('partnerai_user_name', String(data.user_name || user));
                        }
                    } catch (e) {}
                    
                    const redirectUrl = isLogin ? '/' : '/onboarding';
                    window.location.replace(redirectUrl);
                } else {
                    err.innerText = data.error || "Authentication failed.";
                    err.style.display = 'block';
                    err.style.background = 'rgba(254, 226, 226, 0.5)';
                    err.style.color = '#dc2626';
                    btn.innerText = isLogin ? "Sign In" : "Create Account";
                    btn.disabled = false;
                }
            } catch (e) {
                console.error('❌ Auth error:', e);
                err.innerText = "Connection error. Please try again.";
                err.style.display = 'block';
                btn.disabled = false;
            }
        }

        async function resendVerificationCode(event) {
            event.preventDefault();
            if (!pendingSignupPayload) return;
            
            const btn = document.getElementById('btn-resend');
            const err = document.getElementById('error');
            
            btn.innerText = "Sending...";
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/signup/resend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: pendingSignupPayload.username,
                        password: pendingSignupPayload.password,
                        email: pendingSignupPayload.email
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    err.innerText = data.message || "New verification code sent.";
                    err.style.display = 'block';
                    err.style.background = '#eef7ff';
                    err.style.color = '#1d4ed8';
                } else {
                    err.innerText = data.error || "Failed to resend code.";
                    err.style.display = 'block';
                    err.style.background = 'var(--color-error-bg)';
                    err.style.color = 'var(--color-error)';
                }
            } catch (e) {
                err.innerText = "Connection error. Please try again.";
                err.style.display = 'block';
                err.style.background = 'var(--color-error-bg)';
                err.style.color = 'var(--color-error)';
            }
            
            btn.innerText = "Resend Code";
            btn.disabled = false;
        }
    </script>
</body>

</html>
