<!-- 
EXECUTION COACH UI - Add to home.html or create dedicated execution.html
Place this code in your templates directory
-->

<div id="executionCoachSection" style="margin-bottom: var(--space-8);">
    <!-- Momentum Status Card -->
    <div class="card" id="momentumCard" style="margin-bottom: var(--space-6); border-left: 4px solid #667eea;">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-4);">
            <h3 style="font-size: var(--text-lg); font-weight: 600; margin: 0; display: flex; align-items: center; gap: var(--space-2);">
                <span id="momentumEmoji">✅</span>
                Today's Momentum
            </h3>
            <span id="momentumScore" style="font-size: var(--text-2xl); font-weight: 700; color: var(--color-primary-600);">75/100</span>
        </div>

        <!-- Status visual -->
        <div id="momentumBar" style="height: 8px; background: #e5e7eb; border-radius: 4px; margin-bottom: var(--space-3); overflow: hidden;">
            <div id="momentumFill" style="height: 100%; width: 75%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s ease;"></div>
        </div>

        <!-- Status message -->
        <p id="momentumMessage" style="font-size: var(--text-sm); color: var(--color-text-secondary); margin: var(--space-2) 0; line-height: 1.5;">
            On track! You've completed tasks and kept momentum.
        </p>

        <!-- Metrics -->
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--space-3); margin-top: var(--space-4); padding-top: var(--space-4); border-top: 1px solid #e5e7eb;">
            <div style="text-align: center;">
                <div style="font-size: var(--text-2xl); font-weight: 700; color: var(--color-primary-600);" id="tasksCompleted">0</div>
                <p style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin: var(--space-1) 0 0 0;">Tasks Done</p>
            </div>
            <div style="text-align: center;">
                <div style="font-size: var(--text-2xl); font-weight: 700; color: #f59e0b;" id="focusCount">0</div>
                <p style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin: var(--space-1) 0 0 0;">Focus Sessions</p>
            </div>
            <div style="text-align: center;">
                <div style="font-size: var(--text-2xl); font-weight: 700; color: #ef4444;" id="streakCount">0</div>
                <p style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin: var(--space-1) 0 0 0;">Day Streak</p>
            </div>
        </div>
    </div>

    <!-- Current Block & Do Now -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); margin-bottom: var(--space-6);">
        <!-- Do Now Card -->
        <div class="card" id="doNowCard" style="border-left: 4px solid #ef4444;">
            <div style="display: flex; align-items: flex-start; gap: var(--space-3);">
                <div style="font-size: 24px;">⚡</div>
                <div style="flex: 1;">
                    <p style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin: 0 0 var(--space-1) 0; font-weight: 600; text-transform: uppercase;">DO NOW</p>
                    <h4 id="doNowTitle" style="font-size: var(--text-base); font-weight: 600; margin: 0 0 var(--space-2) 0; color: var(--color-text-primary);">
                        Your First Priority
                    </h4>
                    <p id="doNowDuration" style="font-size: var(--text-xs); color: var(--color-text-secondary); margin: 0 0 var(--space-3) 0;">
                        ~25 minutes
                    </p>
                    <button class="btn btn-sm" style="background: #ef4444; color: white; font-weight: 600;" onclick="startDoNowTask()">
                        Start Now
                    </button>
                </div>
            </div>
        </div>

        <!-- Current Block Card -->
        <div class="card" id="currentBlockCard" style="border-left: 4px solid #667eea;">
            <div style="display: flex; align-items: flex-start; gap: var(--space-3);">
                <div style="font-size: 24px;">⏰</div>
                <div style="flex: 1;">
                    <p style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin: 0 0 var(--space-1) 0; font-weight: 600; text-transform: uppercase;">Current Block</p>
                    <h4 id="currentBlockTitle" style="font-size: var(--text-base); font-weight: 600; margin: 0 0 var(--space-2) 0; color: var(--color-text-primary);">
                        09:00 - 10:30
                    </h4>
                    <p id="currentBlockTime" style="font-size: var(--text-xs); color: var(--color-text-secondary); margin: 0;">
                        90 minutes remaining
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Top Priorities -->
    <div style="margin-bottom: var(--space-6);">
        <h3 style="font-size: var(--text-lg); font-weight: 600; color: var(--color-text-primary); margin: 0 0 var(--space-3) 0;">
            Today's Top 3 Priorities
        </h3>
        <div id="prioritiesList" style="display: flex; flex-direction: column; gap: var(--space-3);">
            <!-- Priorities will be loaded here -->
        </div>
    </div>

    <!-- Time Blocks Schedule -->
    <div style="margin-bottom: var(--space-6);">
        <h3 style="font-size: var(--text-lg); font-weight: 600; color: var(--color-text-primary); margin: 0 0 var(--space-3) 0;">
            Today's Schedule
        </h3>
        <div id="timeBlocksList" style="display: flex; flex-direction: column; gap: var(--space-2);">
            <!-- Time blocks will be loaded here -->
        </div>
    </div>

    <!-- Action Buttons -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); margin-top: var(--space-8);">
        <button class="btn btn-primary" style="display: flex; align-items: center; justify-content: center; gap: var(--space-2);" onclick="startFocusSession()">
            <span>🎯</span>
            Start Focus
        </button>
        <button class="btn btn-secondary" style="display: flex; align-items: center; justify-content: center; gap: var(--space-2);" id="rebuildDayBtn" onclick="rebuildDay()" style="display: none;">
            <span>🆘</span>
            Rebuild Day
        </button>
    </div>
</div>

<style>
    .priority-item {
        display: flex;
        align-items: flex-start;
        gap: var(--space-3);
        padding: var(--space-3);
        background: var(--color-bg-secondary);
        border-radius: 8px;
        border-left: 4px solid #667eea;
    }

    .priority-number {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background: var(--color-primary-600);
        color: white;
        border-radius: 50%;
        font-weight: 700;
        font-size: var(--text-sm);
        flex-shrink: 0;
    }

    .priority-content {
        flex: 1;
    }

    .priority-title {
        font-size: var(--text-base);
        font-weight: 600;
        color: var(--color-text-primary);
        margin: 0 0 var(--space-1) 0;
    }

    .priority-meta {
        font-size: var(--text-xs);
        color: var(--color-text-tertiary);
        margin: 0;
    }

    .time-block-item {
        display: flex;
        align-items: center;
        padding: var(--space-3);
        background: var(--color-bg-secondary);
        border-radius: 8px;
        border-left: 4px solid;
    }

    .time-block-time {
        min-width: 100px;
        font-weight: 600;
        font-size: var(--text-sm);
        color: var(--color-text-primary);
    }

    .time-block-content {
        flex: 1;
        margin: 0 var(--space-3);
    }

    .time-block-title {
        font-size: var(--text-sm);
        font-weight: 600;
        color: var(--color-text-primary);
        margin: 0;
    }

    .time-block-type {
        font-size: var(--text-xs);
        color: var(--color-text-tertiary);
        margin: var(--space-1) 0 0 0;
    }

    .time-block-badge {
        display: inline-block;
        padding: 2px 8px;
        background: rgba(102, 126, 234, 0.1);
        color: var(--color-primary-600);
        border-radius: 4px;
        font-size: var(--text-xs);
        font-weight: 500;
    }
</style>

<script>
// Execution Coach JavaScript
let currentPlan = null;
let currentMomentum = null;

async function loadExecutionPlan() {
    try {
        const res = await fetch('/api/execution/today');
        if (!res.ok) throw new Error('Failed to load plan');
        
        currentPlan = await res.json();
        renderExecutionPlan(currentPlan);
        console.log('✅ Execution plan loaded');
    } catch (e) {
        console.error('Error loading execution plan:', e);
        showErrorMessage('Could not load execution plan');
    }
}

async function loadMomentumStatus() {
    try {
        const res = await fetch('/api/execution/momentum');
        if (!res.ok) throw new Error('Failed to load momentum');
        
        currentMomentum = await res.json();
        renderMomentumStatus(currentMomentum);
        
        // Show rebuild button if in recovery mode
        if (currentMomentum.needs_recovery) {
            document.getElementById('rebuildDayBtn').style.display = 'flex';
        }
        
        console.log('✅ Momentum status loaded');
    } catch (e) {
        console.error('Error loading momentum:', e);
    }
}

function renderExecutionPlan(plan) {
    // Render do-now task
    if (plan.do_now_task) {
        document.getElementById('doNowTitle').textContent = plan.do_now_task.title || 'Your First Priority';
        document.getElementById('doNowDuration').textContent = `~${plan.do_now_task.block_duration || 25} minutes`;
    }

    // Render coaching message
    document.querySelector('[id="executionCoachSection"]').style.display = 'block';

    // Render top priorities
    const prioritiesList = document.getElementById('prioritiesList');
    prioritiesList.innerHTML = '';
    
    (plan.top_priorities || []).forEach((task, idx) => {
        const priorityEl = document.createElement('div');
        priorityEl.className = 'priority-item';
        priorityEl.innerHTML = `
            <div class="priority-number">${idx + 1}</div>
            <div class="priority-content">
                <h4 class="priority-title">${task.title || 'Task'}</h4>
                <p class="priority-meta">
                    <span style="color: var(--color-primary-600); font-weight: 600;">${task.priority || 'medium'}</span>
                    ${task.estimated_duration_minutes ? ` • ${task.estimated_duration_minutes} min` : ''}
                </p>
            </div>
        `;
        prioritiesList.appendChild(priorityEl);
    });

    // Render time blocks
    const blocksList = document.getElementById('timeBlocksList');
    blocksList.innerHTML = '';
    
    (plan.time_blocks || []).forEach(block => {
        const blockEl = document.createElement('div');
        blockEl.className = 'time-block-item';
        
        // Color based on block type
        let borderColor = '#667eea';
        let typeEmoji = '📌';
        if (block.block_type === 'focus') {
            borderColor = '#ef4444';
            typeEmoji = '🎯';
        } else if (block.block_type === 'break') {
            borderColor = '#10b981';
            typeEmoji = '☕';
        } else if (block.block_type === 'habit') {
            borderColor = '#f59e0b';
            typeEmoji = '⭐';
        } else if (block.block_type === 'review') {
            borderColor = '#8b5cf6';
            typeEmoji = '📝';
        }
        
        blockEl.style.borderLeftColor = borderColor;
        blockEl.innerHTML = `
            <div class="time-block-time">${block.start_time} - ${block.end_time}</div>
            <div class="time-block-content">
                <p class="time-block-title">${typeEmoji} ${block.task_title || 'Block'}</p>
                <p class="time-block-type">${block.duration_minutes} minutes • ${block.block_type}</p>
            </div>
            <div class="time-block-badge">${block.priority}</div>
        `;
        blocksList.appendChild(blockEl);
    });
}

function renderMomentumStatus(status) {
    document.getElementById('momentumScore').textContent = `${Math.round(status.momentum_score)}/100`;
    document.getElementById('momentumEmoji').textContent = status.status_emoji || '✅';
    document.getElementById('momentumMessage').textContent = status.summary || 'Great work!';
    document.getElementById('tasksCompleted').textContent = status.completed_tasks || 0;
    document.getElementById('streakCount').textContent = (status.momentum_score > 0) ? '🔥' : '0';
    
    // Update momentum bar
    const width = Math.min(status.momentum_score, 100);
    document.getElementById('momentumFill').style.width = `${width}%`;
    
    // Color based on status
    let barColor = '#10b981';  // green for on track
    if (status.status === 'at_risk') {
        barColor = '#f59e0b';  // orange for at risk
    } else if (status.status === 'recovery_mode') {
        barColor = '#ef4444';  // red for recovery
    }
    document.getElementById('momentumFill').style.background = barColor;
}

async function rebuildDay() {
    if (!confirm('Start recovery mode? This will create a lighter rescue plan.')) return;
    
    try {
        const res = await fetch('/api/execution/rebuild-day', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });
        
        if (!res.ok) throw new Error('Failed to rebuild day');
        
        const recovery = await res.json();
        showRecoveryPlan(recovery);
        console.log('✅ Recovery plan generated');
    } catch (e) {
        console.error('Error rebuilding day:', e);
        showErrorMessage('Could not rebuild day');
    }
}

function showRecoveryPlan(recovery) {
    // Show recovery plan in a modal or toast
    alert('Recovery Mode Activated!\n\n' +
        '📌 Must Do: ' + (recovery.must_do_task?.title || 'Task') + '\n' +
        '🎉 Easy Win: ' + (recovery.easy_win_task?.title || 'Quick task') + '\n' +
        '🔥 Habit: ' + (recovery.streak_protecting_habit?.name || 'Habit') + '\n\n' +
        recovery.recovery_message);
}

async function startDoNowTask() {
    if (!currentPlan || !currentPlan.do_now_task) return;
    
    // Could integrate with focus mode here
    window.location.href = '/focus';
}

async function startFocusSession() {
    // Integration with focus mode
    window.location.href = '/focus';
}

function showErrorMessage(msg) {
    console.error(msg);
    // Could show toast notification here
}

// Load on page load
document.addEventListener('DOMContentLoaded', () => {
    loadExecutionPlan();
    loadMomentumStatus();
    
    // Refresh every 30 minutes
    setInterval(() => {
        loadExecutionPlan();
        loadMomentumStatus();
    }, 30 * 60 * 1000);
});
</script>
