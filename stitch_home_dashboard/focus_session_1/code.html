<html><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#5b498d",
            "background-light": "#f9f9fa",
            "background-dark": "#18181b",
          },
          fontFamily: {
            "display": ["Inter"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .mesh-gradient {
      background-color: #f9f9fa;
      background-image: 
        radial-gradient(at 0% 0%, rgba(91, 73, 141, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(168, 163, 216, 0.15) 0px, transparent 50%),
        radial-gradient(at 50% 50%, rgba(255, 255, 255, 0.8) 0px, transparent 100%);
    }
    .dark .mesh-gradient {
      background-color: #18181b;
      background-image: 
        radial-gradient(at 0% 0%, rgba(91, 73, 141, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(30, 30, 35, 0.8) 0px, transparent 50%);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="light">
<div class="relative flex h-screen w-full flex-col mesh-gradient group/design-root overflow-hidden font-display transition-colors duration-500 dark:bg-background-dark">
<!-- Top Session Info (MetaText) -->
<div class="pt-12 px-6 flex flex-col items-center">
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 dark:bg-primary/20">
<span class="material-symbols-outlined text-primary text-sm">target</span>
<p class="text-primary dark:text-primary/90 text-xs font-bold uppercase tracking-widest leading-normal">
          Designing Pitch Deck
        </p>
</div>
</div>
<!-- Main Content Area: Centered Timer & Quote -->
<div class="flex-1 flex flex-col items-center justify-center px-4">
<!-- HeadlineText (The Motivational Quote) -->
<h1 class="text-primary dark:text-white tracking-tight text-[28px] md:text-[32px] font-bold leading-tight text-center pb-8">
        Just 25 minutes.<br/><span class="opacity-60">Stay here.</span>
</h1>
<!-- Timer Component -->
<div class="flex gap-4 w-full max-w-xs justify-center items-center">
<!-- Minutes -->
<div class="flex flex-col items-center gap-2">
<div class="flex h-24 w-24 sm:h-32 sm:w-32 items-center justify-center rounded-3xl bg-white/40 dark:bg-white/5 backdrop-blur-xl border border-white/20 dark:border-white/10 shadow-sm">
<p class="text-primary dark:text-white text-4xl sm:text-5xl font-bold leading-none tracking-tighter">25</p>
</div>
<p class="text-primary/60 dark:text-white/40 text-[10px] font-bold uppercase tracking-[0.2em]">Minutes</p>
</div>
<!-- Divider -->
<div class="pb-6">
<p class="text-primary/30 dark:text-white/20 text-4xl font-light">:</p>
</div>
<!-- Seconds -->
<div class="flex flex-col items-center gap-2">
<div class="flex h-24 w-24 sm:h-32 sm:w-32 items-center justify-center rounded-3xl bg-white/40 dark:bg-white/5 backdrop-blur-xl border border-white/20 dark:border-white/10 shadow-sm">
<p class="text-primary dark:text-white text-4xl sm:text-5xl font-bold leading-none tracking-tighter">00</p>
</div>
<p class="text-primary/60 dark:text-white/40 text-[10px] font-bold uppercase tracking-[0.2em]">Seconds</p>
</div>
</div>
</div>
<!-- Bottom Controls Area -->
<div class="pb-12 px-6 flex flex-col gap-6 items-center">
<!-- MediaPlayer Component (Minimalist) -->
<div class="w-full max-w-md">
<div class="flex flex-col gap-3 rounded-2xl bg-white/40 dark:bg-white/5 backdrop-blur-md border border-white/20 dark:border-white/10 px-4 py-3">
<div class="flex items-center gap-4 overflow-hidden">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-xl size-12 shrink-0 border border-primary/10" data-alt="Soft abstract watercolor texture in purple and blue" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCcnnyCScGWjdypGWTlVtUXgDyEhm1GONOl_NLBeZsInh84ODpLHVX4xV14ut7YdsmhjIg8oe27FoyKIYuR_rn_5dv370TElU96xhwoTPx4QmcXxDX2QUeSyP6eKnD8e1TXvz89-bHsJQ265owJ7ewdZcuuepw61ecBw7RxJ-CREgjIOiAHyp1MxtT53VjL5ETwkYWwHlaD03GngqeP_poT3AnK1kJnliu7JWKxWiKpCcyuZajxpKBdLgXldIbID-kQnVHatAZ1j4g");'>
</div>
<div class="flex-1">
<p class="text-primary dark:text-white text-sm font-bold leading-tight truncate">Ambient Rain</p>
<p class="text-primary/60 dark:text-white/40 text-xs font-normal leading-normal truncate">Focus Sounds</p>
</div>
<button class="flex shrink-0 items-center justify-center rounded-full size-10 bg-primary text-white shadow-lg shadow-primary/20 hover:scale-105 transition-transform">
<span class="material-symbols-outlined" style="font-size: 20px;">play_arrow</span>
</button>
</div>
</div>
</div>
<!-- SingleButton Component (End Session) -->
<div class="flex justify-center">
<button class="flex min-w-[120px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-6 bg-transparent text-primary/40 dark:text-white/30 text-xs font-bold leading-normal tracking-widest uppercase hover:text-primary transition-colors">
<span class="truncate">End Session</span>
</button>
</div>
</div>
<!-- Invisible Progress Bar at Top -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary/5">
<div class="h-full bg-primary/40 w-1/3 rounded-r-full"></div>
</div>
</div>
</body></html>
